<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CuriosityAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #000000);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-focus {
            transition: all 0.3s ease;
        }

        .input-focus:focus {
            border-color: #6366f1;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }

        .gradient-text {
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .animate-blob {
            animation: blob 7s infinite;
        }

        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }

        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
    </style>
</head>
<body>
    <!-- Background Blobs -->
    <div class="fixed top-0 -left-4 w-72 h-72 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob"></div>
    <div class="fixed top-0 -right-4 w-72 h-72 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000"></div>
    <div class="fixed -bottom-8 left-20 w-72 h-72 bg-pink-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-4000"></div>

    <div class="relative w-full max-w-md p-8 glass rounded-3xl">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-white mb-2 tracking-tight">Welcome <span class="gradient-text">Back</span></h1>
            <p class="text-gray-400">Enter your credentials to access CuriosityAI</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div class="space-y-2">
                <label for="email" class="text-sm font-medium text-gray-300 ml-1">Email Address</label>
                <input type="email" id="email" required 
                    class="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-2xl text-white outline-none input-focus placeholder-gray-600"
                    placeholder="name@example.com">
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center ml-1">
                    <label for="password" class="text-sm font-medium text-gray-300">Password</label>
                    <a href="#" class="text-xs text-indigo-400 hover:text-indigo-300 transition-colors">Forgot password?</a>
                </div>
                <input type="password" id="password" required 
                    class="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-2xl text-white outline-none input-focus placeholder-gray-600"
                    placeholder="••••••••">
            </div>

            <button type="submit" 
                class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-2xl transition-all duration-300 transform hover:scale-[1.02] active:scale-95 shadow-lg shadow-indigo-500/25">
                Sign In
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-gray-400 text-sm">
                Don't have an account? 
                <a href="/register.html" class="text-indigo-400 font-semibold hover:text-indigo-300 transition-colors ml-1">Create Account</a>
            </p>
        </div>

        <div id="message" class="mt-6 text-center text-sm font-medium hidden"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            messageDiv.classList.remove('hidden', 'text-red-400', 'text-green-400');
            messageDiv.textContent = 'Verifying...';
            messageDiv.classList.add('text-indigo-400');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    messageDiv.textContent = 'Login successful! Redirecting...';
                    messageDiv.classList.replace('text-indigo-400', 'text-green-400');
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1500);
                } else {
                    messageDiv.textContent = data.message || 'Login failed';
                    messageDiv.classList.replace('text-indigo-400', 'text-red-400');
                }
            } catch (error) {
                messageDiv.textContent = 'Something went wrong. Please try again.';
                messageDiv.classList.replace('text-indigo-400', 'text-red-400');
            }
        });
    </script>
</body>
</html>
